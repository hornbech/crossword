<div class="min-h-screen bg-gray-50">
  <header class="bg-white border-b border-gray-200 px-6 py-4">
    <h1 class="text-2xl font-bold text-gray-800">Crossword Generator</h1>
    <p class="text-sm text-gray-500 mt-1">
      Deterministic puzzles powered by Dancing Links
    </p>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8">
    <app-control-panel (generate)="onGenerate($event)" />

    @if (loading()) {
      <div class="mt-8 flex items-center gap-3 text-gray-500">
        <svg
          class="animate-spin h-5 w-5"
          viewBox="0 0 24 24"
          fill="none"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          />
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
          />
        </svg>
        <span class="text-sm">Generating crossword...</span>
      </div>
    }

    @if (error(); as err) {
      <div
        class="mt-8 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-md text-sm"
      >
        {{ err }}
      </div>
    }

    @if (puzzle(); as data) {
      <div class="mt-8">
        <p class="text-xs text-gray-400 mb-3">
          Seed: <span class="font-mono">{{ data.seed }}</span> &middot;
          {{ data.size }}&times;{{ data.size }} &middot;
          {{ data.words.length }} words
        </p>
        <app-crossword-grid [data]="data" />
      </div>
    }
  </main>
</div>

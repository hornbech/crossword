version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
    networks:
      - crossword-net

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - crossword-net

networks:
  crossword-net:
    driver: bridge
